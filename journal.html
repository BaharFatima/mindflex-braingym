//detect category
function detectCategory(topics){

const categories = {

school:["exam","assignment","class","teacher","project","college"],

relationships:["friend","family","mom","dad","boyfriend","girlfriend"],

health:["sleep","diet","exercise","sick","tired"],

work:["job","meeting","deadline","boss"]

}

let detected = []

topics.forEach(topic=>{

Object.keys(categories).forEach(cat=>{

if(categories[cat].some(word=>topic.includes(word))){
detected.push(cat)
}

})

})

return detected

}

//analysis function
function analyzeJournal(text){

  const doc = nlp(text)

  // extract topics (nouns)
  const topics = doc.nouns().out("array")

  //category detection
  categories = detectCategory(topics) || []

  // sentiment detection
  const positiveWords = ["happy","great","good","productive","excited"]
const negativeWords = ["sad","anxious","stress","angry","tired"]

const negations = ["not","never","no","dont","didnt","isnt","wasnt","cant"]

let score = 0

const words = text.toLowerCase().split(/\s+/)

for (let i = 0; i < words.length; i++) {

    let word = words[i]
    let prev = words[i-1] || ""

    // NEGATION LOGIC
    if (negations.includes(prev)) {

        if (positiveWords.includes(word)) {
            score--
            continue
        }

        if (negativeWords.includes(word)) {
            score++
            continue
        }
    }

    // NORMAL SENTIMENT
    if (positiveWords.includes(word)) score++
    if (negativeWords.includes(word)) score--
}
}

//function insights
function generateInsights(data){

let insights = []

if(data.maxNegativeStreak >= 3){
insights.push("Repeated negative mood detected for several entries.")
}

if(data.anxietyCount >= 3){
insights.push("Frequent anxiety signals found in recent journal entries.")
}

if(data.sleepLowNegative >= 2){
insights.push("Low sleep appears correlated with negative mood.")
}

if(insights.length === 0){
insights.push("No major behavioral patterns detected yet.")
}

document.getElementById("insightsBox").innerHTML =
"<b>Behavior Insights</b><br>" + insights.join("<br>")

}

//analyze entries
function analyzeEntries(entries){

let anxietyCount = 0
let negativeStreak = 0
let maxNegativeStreak = 0
let sleepLowNegative = 0

entries.forEach(entry => {

if(entry.sentiment === "negative"){
negativeStreak++
maxNegativeStreak = Math.max(maxNegativeStreak, negativeStreak)
}else{
negativeStreak = 0
}

if(entry.emotions && entry.emotions.includes("anxiety")){
anxietyCount++
}

if(entry.sleepHours <= 5 && entry.sentiment === "negative"){
sleepLowNegative++
}

})

generateInsights({
anxietyCount,
maxNegativeStreak,
sleepLowNegative
})

}

//load entries
  async function loadEntries(uid) {
    allEntries = []
    entriesEl.innerHTML = "";

    const snapshot = await db
      .collection("users")
      .doc(uid)
      .collection("journal")
      .orderBy("savedAt", "desc")
      .get();

    if (snapshot.empty) {
      emptyMsg.style.display = "block";
      return;
    }

    emptyMsg.style.display = "none";

    snapshot.forEach(doc => {
   const data = doc.data();
   allEntries.push(data)
   const docId = doc.id;

      const card = document.createElement('div');
      card.className = 'entry-card';

      const top = document.createElement('div');
      top.className = 'entry-top';
      top.innerHTML = `
  <div class="entry-title">${escapeHtml(data.title || "Untitled")}</div>
  <div class="entry-date">
    ${data.savedAt ? data.savedAt.toDate().toLocaleString() : ""}
  </div>
`;

      const snippet = document.createElement('div');
      snippet.className = 'entry-snippet';
      snippet.textContent = (data.content || "").slice(0, 160);

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      // DELETE BUTTON
      const delBtn = document.createElement('button');
      delBtn.className = 'small-btn';
      delBtn.textContent = 'Delete';
      delBtn.onclick = async () => {
        if (!confirm("Delete this entry?")) return;

        await db
          .collection("users")
          .doc(auth.currentUser.uid)
          .collection("journal")
          .doc(docId)
          .delete();

        loadEntries(auth.currentUser.uid);
      };

      actions.appendChild(delBtn);

      card.appendChild(top);
      card.appendChild(snippet);
      card.appendChild(actions);

      entriesEl.appendChild(card);
    });
    drawMoodChart()
    const recent = allEntries.slice(0,7)

    drawStressChart()
    generateWeeklySummary(allEntries)

    const topKeywords = computeTFIDF(allEntries)

const keywordBox = document.getElementById("keywordInsights")

if(keywordBox){
keywordBox.innerHTML =
"<b>Key Themes</b><br>" +
topKeywords.map(k => "• " + k[0]).join("<br>")
}
  }


//stress chart 
function drawStressChart(){

if(allEntries.length === 0) return

let categoryCounts = {
school:0,
relationships:0,
health:0,
work:0
}

allEntries.forEach(entry=>{

// only count negative emotional entries
if(entry.sentiment !== "negative") return

if(!entry.categories) return

entry.categories.forEach(cat=>{
if(categoryCounts[cat] !== undefined){
categoryCounts[cat]++
}
})

})

const ctx = document.getElementById("stressChart")

new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(categoryCounts),
datasets:[{
label:"Stress Sources",
data:Object.values(categoryCounts)
}]
},
options:{
plugins:{
legend:{display:false}
}
}
})

}
  //mood chart
  function drawMoodChart(){

if(allEntries.length === 0) return

let sentimentData = []

allEntries.forEach(entry=>{

if(entry.sentiment === "positive") sentimentData.push(1)
else if(entry.sentiment === "neutral") sentimentData.push(0)
else if(entry.sentiment === "negative") sentimentData.push(-1)
else sentimentData.push(0)

})

const ctx = document.getElementById("moodChart")

new Chart(ctx,{
type:"line",
data:{
labels: sentimentData.map((_,i)=>"Entry "+(i+1)),
datasets:[{
label:"Mood Trend",
data: sentimentData,
tension:0.4
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
y:{
min:-1,
max:1,
ticks:{
stepSize:1,
callback:function(value){

if(value === 1) return "Positive"
if(value === 0) return "Neutral"
if(value === -1) return "Negative"

return value

}
}
}
}
}
})

}
  function escapeHtml(s) {
    return (s + '').replace(/[&<>"']/g, c => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
  }

  fab.onclick = () => {

  };

  clearAllBtn.onclick = async () => {
    if (!confirm("Clear ALL entries?")) return;

    const snapshot = await db
      .collection("users")
      .doc(auth.currentUser.uid)
      .collection("journal")
      .get();

    const batch = db.batch();

    snapshot.forEach(doc => {
      batch.delete(doc.ref);
    });

    await batch.commit();

    loadEntries(auth.currentUser.uid);
  };

  //detection of frequent mood
  function detectFrequentEmotion(entries){

let emotionCount = {}

entries.forEach(e=>{
(e.emotions || []).forEach(em=>{
emotionCount[em] = (emotionCount[em] || 0) + 1
})
})

return emotionCount

}

//weekly mood dashboard
function generateWeeklySummary(entries){

const now = new Date()
const oneWeekAgo = new Date()
oneWeekAgo.setDate(now.getDate() - 7)

let weeklyEntries = entries.filter(e=>{
if(!e.savedAt) return false
return e.savedAt.toDate() >= oneWeekAgo
})

let positive = 0
let negative = 0
let neutral = 0

let emotionCount = {}

weeklyEntries.forEach(e=>{

if(e.sentiment === "positive") positive++
if(e.sentiment === "negative") negative++
if(e.sentiment === "neutral") neutral++

(e.emotions || []).forEach(em=>{
emotionCount[em] = (emotionCount[em] || 0) + 1
})

})

let topEmotion = "none"

let max = 0

Object.entries(emotionCount).forEach(([emotion,count])=>{
if(count > max){
max = count
topEmotion = emotion
}
})

document.getElementById("weeklySummary").innerHTML =
`<b>Weekly Mood Summary</b><br>
Positive entries: ${positive}<br>
Neutral entries: ${neutral}<br>
Negative entries: ${negative}<br>
Most frequent emotion: ${topEmotion}`
}
