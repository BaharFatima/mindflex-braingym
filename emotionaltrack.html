/* APP CONTAINER */

  flex-direction:column;
  overflow:hidden;
  position:relative;
  padding:18px;
  box-sizing:border-box;
}

/* Decorative Transparent Circles */
.app::before{
  content:"";
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  background:rgba(255,255,255,0.25);
  top:-70px;
  right:-60px;
  z-index:0;
}

.app::after{
  content:"";
  position:absolute;
  width:170px;
  height:170px;
  border-radius:50%;
  background:rgba(255,255,255,0.18);
  bottom:-60px;
  left:-50px;
  z-index:0;
}

/* HEADER */
header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
  font-weight:600;
  font-size:18px;
  color:#0D47A1;
}

/* Glass Back Button */
.back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 1.6rem;
      cursor: pointer;
      color: #003366;
      font-weight: bold;
      text-decoration: none;
    }



/* GLASS CARD */
.main{
  flex:1;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(14px);
  border-radius:26px;
  padding:16px;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* LEVEL */
.level{
  text-align:center;
  font-weight:700;
  margin-bottom:10px;
  color:#0D47A1;
}

/* SITUATION CARD */
.situation{
  background:rgba(255,255,255,0.9);
  padding:16px;
  border-radius:18px;
  font-size:13px;
  margin-bottom:14px;
  min-height:95px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* OPTIONS */
.options{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Option Button */
.option-btn{
  background:rgba(255,255,255,0.85);
  border:none;
  border-radius:16px;
  padding:12px;
  font-size:13px;
  cursor:pointer;
  text-align:left;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
  transition:.2s;
}

.option-btn:hover{
  transform:scale(1.02);
  background:#E3F2FD;
}

/* Correct / Wrong */
.correct{
  background:#C8E6C9 !important;
}

.wrong{

}

/* Explanation */

  margin-top:14px;
  font-size:12px;
  color:#1a237e;
  min-height:40px;

let level = 1;
let correctCount = 0;
let wrongAttempts = 0;

const situationBox = document.getElementById("situationBox");
const optionsBox = document.getElementById("optionsBox");
const explanationBox = document.getElementById("explanationBox");
const nextBtn = document.getElementById("nextBtn");
const levelText = document.getElementById("levelText");

function loadLevel(){
  const data = levels[level-1];
  levelText.textContent = "Level " + level;
  situationBox.textContent = data.situation;
  explanationBox.textContent="";
  nextBtn.style.display="none";
  optionsBox.innerHTML="";

  data.options.forEach((opt,index)=>{
    const btn=document.createElement("button");
    btn.className="option-btn";
    btn.textContent=opt;
    btn.onclick=()=>handleAnswer(index, btn);
    optionsBox.appendChild(btn);
  });
}

function handleAnswer(selected, clickedButton){
  const data = levels[level-1];

  if(selected === data.correctIndex){

    clickedButton.classList.add("correct");
    correctCount++;
    explanationBox.textContent="Correct. Good emotional reasoning.";
    nextBtn.style.display="block";

    // disable all buttons after correct
    document.querySelectorAll(".option-btn")
      .forEach(btn=>btn.disabled=true);

  } else {

    wrongAttempts++;
    clickedButton.classList.add("wrong");

    explanationBox.textContent = data.explanation;

    // remove red highlight after short delay
    setTimeout(()=>{
      clickedButton.classList.remove("wrong");
    },800);
  }
}

nextBtn.onclick = async ()=>{
  level++;

  if(level > levels.length){
    await saveProgress();
    alert("Training Complete");
    level = 1;
  }

  loadLevel();
};

async function saveProgress(){
  const accuracy = (
    (correctCount/(correctCount+wrongAttempts))*100
  ).toFixed(2);

  await setDoc(doc(db,"progress",deviceId),{
    emotionTrainer:{
      level,
      correct:correctCount,
      wrongAttempts,
      accuracy
    }
  },{merge:true});
}
