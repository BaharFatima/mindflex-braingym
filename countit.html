

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count It | MindFlex</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#E5E7EB;
  font-family:'Poppins',sans-serif;
}

.container{
  width:320px;
  height:640px;
  border-radius:32px;
  background:linear-gradient(180deg,#a0c9ec,#AFC4D6);
  box-shadow:0 30px 60px rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-weight:600;
  font-size:18px;
  color:#3e61b2;
}

.back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 1.6rem;
      cursor: pointer;
      color: #003366;
      font-weight: bold;
      text-decoration: none;
    }
/* MAIN */
.main{
  flex:1;
  margin:15px;
  background:rgba(255,255,255,0.75);
  border-radius:24px;
  padding:20px 15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  text-align:center;
}

.level-display{
  font-size:20px;
  font-weight:700;
  margin-bottom:5px;
  color:#2e4fa3;
}

.instruction{
  font-size:14px;
  margin-bottom:15px;
}

.game-area{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  min-height:220px;
  width:100%;
}

.object{
  font-size:2.2rem;
  margin:6px;
}

.options{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.option{
  background:#BBDEFB;
  border:none;
  border-radius:14px;
  padding:10px 18px;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}

.option:hover{
  transform:scale(1.05);
}

.next-btn{
  margin-top:20px;
  background:#3e61b2;
  color:white;
  border:none;
  border-radius:18px;
  padding:10px 20px;
  display:none;
  cursor:pointer;
}

.stats{
  font-size:12px;
  margin-top:15px;
  color:#2e4fa3;
}
</style>
</head>

<body>
<div class="container">

<header>
  <div class="left-header">
        <a href="focuslab.html" class="back-btn">←</a>
        </div>
  Count It
</header>

<div class="main">

<div class="level-display" id="levelText"></div>
<div class="instruction">Count the objects carefully</div>

<div class="game-area" id="gameArea"></div>

<div class="options" id="options"></div>

<button class="next-btn" id="nextBtn">Next Level</button>

<div class="stats" id="statsBox"></div>

</div>
</div>

<script type="module">
import { addXP } from "./xp.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {   apiKey: "AIzaSyD9bnmF1N44Nkuk3WZQjK9z4gRE00VRmCY",
  authDomain: "mindflex-b2a0c.firebaseapp.com",
  projectId: "mindflex-b2a0c",
  storageBucket: "mindflex-b2a0c.firebasestorage.app",
  messagingSenderId: "148676867562",
  appId: "1:148676867562:web:3365a72b6fa6b3751cee93",
  measurementId: "G-Q2T6HD3S0E"
}; 

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);          // ✅ declared once, using the imported getAuth

let uid = null;
let firebaseReady = false;

// ✅ Removed the stray duplicate `const auth` and orphaned `await setDoc` block entirely

const emojis = ["🍎","🍌","🍇","🍓","🍪","🎈","🐶","🐱","🐢","🐧","🌻","🌸","🍕","🍉","🥕"];
let level = 1;
const maxLevel = 100;
let totalAttempts = 0, correctAnswers = 0, correctAnswer = 0, highestLevel = 1;

const gameArea   = document.getElementById('gameArea');
const optionsDiv = document.getElementById('options');
const nextBtn    = document.getElementById('nextBtn');
const levelText  = document.getElementById('levelText');
const statsBox   = document.getElementById('statsBox');

// ✅ onAuthStateChanged gates everything — no race condition
onAuthStateChanged(auth, async (user) => {
  if (user) { uid = user.uid; firebaseReady = true; }
  await loadProgress();
});

async function loadProgress() {
  if (firebaseReady) {
    try {
      const snap = await getDoc(doc(db, "users", uid, "games", "countIt"));
      if (snap.exists()) {
        const d = snap.data();
        level          = d.level          || 1;
        totalAttempts  = d.totalAttempts  || 0;
        correctAnswers = d.correctAnswers || 0;
        highestLevel   = d.highestLevel   || 1;
      }
    } catch(e) { console.log("Load failed:", e); }
  }
  startLevel();
}

async function saveProgress() {
  if (!firebaseReady) return;
  const accuracy = totalAttempts === 0 ? 0 : ((correctAnswers/totalAttempts)*100).toFixed(2);
  try {
    await setDoc(doc(db,"users",uid,"games","countIt"),
      { level, highestLevel, totalAttempts, correctAnswers, accuracy, lastPlayed: new Date() },
      { merge: true });
  } catch(e) { console.log("Save failed:", e); }
}

function startLevel() {
  gameArea.innerHTML = ""; optionsDiv.innerHTML = "";
  nextBtn.style.display = "none";
  levelText.textContent = "Level " + level;
  const emoji = emojis[Math.floor(Math.random()*emojis.length)];
  correctAnswer = Math.floor(Math.random()*(level+5))+5;
  for (let i = 0; i < correctAnswer; i++) {
    const span = document.createElement("span");
    span.textContent = emoji; span.className = "object";
    gameArea.appendChild(span);
  }
  const opts = new Set([correctAnswer]);
  while (opts.size < 4) opts.add(Math.floor(Math.random()*(correctAnswer+5))+1);
  Array.from(opts).sort(()=>Math.random()-0.5).forEach(num => {
    const btn = document.createElement("button");
    btn.className = "option"; btn.textContent = num;
    btn.onclick = () => checkAnswer(num, btn);
    optionsDiv.appendChild(btn);
  });
  updateStats();
}

async function checkAnswer(selected, btn) {
  totalAttempts++;
  optionsDiv.querySelectorAll(".option").forEach(b => b.onclick = null); // prevent multi-click
 if (selected === correctAnswer) {
  correctAnswers++;
  btn.style.background = "#4CAF50";
  if (level > highestLevel) highestLevel = level;
  await addXP(db, auth.currentUser, 10); // ✅ awards 10 XP per correct answer
} else {
    btn.style.background = "#E57373";
    optionsDiv.querySelectorAll(".option").forEach(b => {
      if (Number(b.textContent) === correctAnswer) b.style.background = "#4CAF50";
    });
  }
  nextBtn.style.display = "block";
  updateStats();
}

function updateStats() {
  const accuracy = totalAttempts === 0 ? 0 : ((correctAnswers/totalAttempts)*100).toFixed(1);
  statsBox.textContent = `Attempts: ${totalAttempts} | Accuracy: ${accuracy}%`;
}

nextBtn.onclick = async () => {
  if (++level > maxLevel) { alert("You completed 100 levels!"); level = 1; }
  await saveProgress();
  startLevel();
};
</script>
</body>
</html>
